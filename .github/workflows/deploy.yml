name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages 배포는 한 번에 하나만 진행되도록 (이전 배포가 끝나기 전에 새 배포가 시작되면 대기).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xds-generator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: xds-generator/package-lock.json

      - run: npm ci

      # Vite의 `base`를 레포 이름으로 맞춰 GH Pages 서브경로에서 에셋이 정상 로드되게 한다.
      # BrowserRouter는 App.tsx에서 import.meta.env.BASE_URL을 basename으로 받는다.
      - name: Build
        run: npm run build -- --base=/xinics-design-system/

      # GH Pages는 SPA fallback이 없으므로 알 수 없는 경로는 404.html을 반환한다.
      # 그 404.html이 index.html과 동일하면 React Router가 클라이언트에서 라우팅을 마저 처리.
      - name: SPA fallback (404 = index)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: xds-generator/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
